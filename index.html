<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Territórios</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

<div id="resultado"></div>

<script>

const supabaseUrl = 'https://mtokqolvifjuzxcxuxph.supabase.co'
const supabaseKey = 'sb_publishable_rppr0kLef4HDaYC8gHDrbg_LXggzCFL'

const client = supabase.createClient(supabaseUrl, supabaseKey)

let territorioAtual = null
let diaAtual = null

async function verDia(dia){

diaAtual = dia

const { data, error } = await client
.from('territorio_em_uso')
.select('*')
.eq('dia_semana', dia)
.single()

if(error || !data){
document.getElementById("resultado").innerHTML = "Erro ao carregar território"
return
}

territorioAtual = data

const { data: territorio } = await client
.from('territorios')
.select('*')
.eq('id', data.territorio_id)
.single()

document.getElementById("resultado").innerHTML = `

<div style="border:1px solid #ccc;padding:20px;border-radius:10px;width:300px">

<h2>${dia}</h2>

<p><b>Território:</b> ${territorio.numero}</p>

<p><b>Responsável:</b> ${data.responsavel || "Ninguém"}</p>

<p><b>Status:</b> ${data.status}</p>

<a href="${territorio.link_mapa}" target="_blank">
<button>Ver mapa</button>
</a>

${data.status === "disponivel" ? `

<br><br>
<input id="nome" placeholder="Digite seu nome">

<br><br>
<button onclick="pegarTerritorio()">Pegar território</button>

` : `

<br><br>
<button onclick="concluirTerritorio()">Concluir território</button>

`}

</div>

`

}

async function pegarTerritorio(){

const nome = document.getElementById("nome").value

if(!nome){
alert("Digite seu nome")
return
}

// verifica novamente no banco
const { data: atual } = await client
.from('territorio_em_uso')
.select('*')
.eq('dia_semana', diaAtual)
.single()

if(!atual || atual.status !== "disponivel"){
alert("Este território acabou de ser reservado por outro irmão.")
verDia(diaAtual)
return
}

// reserva território
await client
.from('territorio_em_uso')
.update({
responsavel: nome,
status: "em andamento",
data_de_retirada: new Date()
})
.eq('dia_semana', diaAtual)

alert("Território reservado!")

verDia(diaAtual)

}

async function concluirTerritorio(){

const atual = territorioAtual.territorio_id

// salvar histórico
await client
.from('historico')
.insert({
territorio: atual,
responsavel: territorioAtual.responsavel,
dia_semana: diaAtual,
data_conclusao: new Date()
})

// territórios já usados nesse dia da semana
const { data: usadosDia } = await client
.from('historico')
.select('territorio')
.eq('dia_semana', diaAtual)

const usadosNesseDia = (usadosDia || []).map(t => parseInt(t.territorio))

// territórios em uso na semana
const { data: emUso } = await client
.from('territorio_em_uso')
.select('territorio_id')

const usadosSemana = (emUso || []).map(t => t.territorio_id)

// todos territórios
const { data: territorios } = await client
.from('territorios')
.select('*')

// candidatos válidos
let candidatos = territorios.filter(t =>
!usadosNesseDia.includes(t.id) &&
!usadosSemana.includes(t.id)
)

// se não houver candidato
if(candidatos.length === 0){

alert("Sem território disponível. Contatar Servo de Território.")
return

}

// escolher primeiro disponível
const proximo = candidatos[0]

// atualizar território do dia
await client
.from('territorio_em_uso')
.update({
territorio_id: proximo.id,
responsavel: null,
status: "disponivel"
})
.eq('dia_semana', diaAtual)

alert("Território concluído!")

verDia(diaAtual)

}

// abrir automaticamente no dia atual
const dias = [
"domingo",
"segunda-feira",
"terça-feira",
"quarta-feira",
"quinta-feira",
"sexta-feira",
"sábado"
]

const hoje = new Date().getDay()

verDia(dias[hoje])

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Territórios</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family: Arial, sans-serif;
background:#f3f4f6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
width:320px;
text-align:left;
}

h2{
margin-top:0;
text-transform:capitalize;
}

p{
margin:6px 0;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-top:10px;
}

.botao-mapa{
background:#10b981;
}

.botao-mapa:hover{
background:#059669;
}

</style>

</head>

<body>

<div id="resultado"></div>

<script>

const supabaseUrl = 'https://mtokqolvifjuzxcxuxph.supabase.co'
const supabaseKey = 'sb_publishable_rppr0kLef4HDaYC8gHDrbg_LXggzCFL'

const client = supabase.createClient(supabaseUrl, supabaseKey)

let territorioAtual = null
let diaAtual = null

async function verDia(dia){

diaAtual = dia

const { data, error } = await client
.from('territorio_em_uso')
.select('*')
.eq('dia_semana', dia)
.single()

if(error || !data){
document.getElementById("resultado").innerHTML = "Erro ao carregar território"
return
}

territorioAtual = data

const { data: territorio } = await client
.from('territorios')
.select('*')
.eq('id', data.territorio_id)
.single()

document.getElementById("resultado").innerHTML = `

<div class="card">

<h2>${dia}</h2>

<p><b>Território:</b> ${territorio.numero}</p>

<p><b>Responsável:</b> ${data.responsavel || "Ninguém"}</p>

<p><b>Status:</b> ${data.status}</p>

<a href="${territorio.link_mapa}" target="_blank">
<button class="botao-mapa">Ver mapa</button>
</a>

${data.status === "disponivel" ? `

<input id="nome" placeholder="Digite seu nome">

<button onclick="pegarTerritorio()">Pegar território</button>

` : `

<button onclick="concluirTerritorio()">Concluir território</button>

`}

</div>

`

}

async function pegarTerritorio(){

const nome = document.getElementById("nome").value

if(!nome){
alert("Digite seu nome")
return
}

const { data: atual } = await client
.from('territorio_em_uso')
.select('*')
.eq('dia_semana', diaAtual)
.single()

if(!atual || atual.status !== "disponivel"){
alert("Este território acabou de ser reservado por outro irmão.")
verDia(diaAtual)
return
}

await client
.from('territorio_em_uso')
.update({
responsavel: nome,
status: "em andamento",
data_de_retirada: new Date()
})
.eq('dia_semana', diaAtual)

alert("Território reservado!")

verDia(diaAtual)

}

async function concluirTerritorio(){

const atual = territorioAtual.territorio_id

await client
.from('historico')
.insert({
territorio: atual,
responsavel: territorioAtual.responsavel,
dia_semana: diaAtual,
data_conclusao: new Date()
})

// pegar todos territórios ordenados
const { data: territorios } = await client
.from('territorios')
.select('*')
.order('numero', { ascending: true })

// descobrir posição do atual
let indexAtual = territorios.findIndex(t => t.id === atual)

// escolher próximo
let proximo = territorios[indexAtual + 1]

// se chegou no final volta para o primeiro
if(!proximo){
proximo = territorios[0]
}

// atualizar território
await client
.from('territorio_em_uso')
.update({
territorio_id: proximo.id,
responsavel: null,
status: "disponivel"
})
.eq('dia_semana', diaAtual)

alert("Território concluído!")

verDia(diaAtual)

}

// detectar dia atual
const dias = [
"domingo",
"segunda-feira",
"terça-feira",
"quarta-feira",
"quinta-feira",
"sexta-feira",
"sábado"
]

const hoje = new Date().getDay()

verDia(dias[hoje])

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Territórios</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family: Arial, sans-serif;
background:#f3f4f6;
margin:0;
padding:30px;
}

.container{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
width:260px;
}

h2{
margin-top:0;
}

p{
margin:6px 0;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

.botao-mapa{
background:#10b981;
}

.botao-mapa:hover{
background:#059669;
}

input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-top:10px;
}

</style>

</head>

<body>

<div id="resultado" class="container"></div>

<script>

const supabaseUrl = 'https://mtokqolvifjuzxcxuxph.supabase.co'
const supabaseKey = 'sb_publishable_rppr0kLef4HDaYC8gHDrbg_LXggzCFL'

const client = supabase.createClient(supabaseUrl, supabaseKey)

const dias = [
"domingo",
"segunda-feira",
"terça-feira",
"quarta-feira",
"quinta-feira",
"sexta-feira",
"sábado"
]

async function carregarSemana(){

document.getElementById("resultado").innerHTML = ""

for(let dia of dias){

const { data } = await client
.from('territorio_em_uso')
.select('*')
.eq('dia_semana', dia)
.single()

if(!data) continue

const { data: territorio } = await client
.from('territorios')
.select('*')
.eq('id', data.territorio_id)
.single()

document.getElementById("resultado").innerHTML += `

<div class="card">

<h2>${dia}</h2>

<p><b>Território:</b> ${territorio.numero}</p>

<p><b>Responsável:</b> ${data.responsavel || "Ninguém"}</p>

<p><b>Status:</b> ${data.status}</p>

<a href="${territorio.link_mapa}" target="_blank">
<button class="botao-mapa">Ver mapa</button>
</a>

${data.status === "disponivel" ? `

<input id="nome-${dia}" placeholder="Digite seu nome">

<button onclick="pegarTerritorio('${dia}')">
Pegar território
</button>

` : `

<button onclick="concluirTerritorio('${dia}', ${data.territorio_id}, '${data.responsavel}')">
Concluir território
</button>

`}

</div>

`

}

}

async function pegarTerritorio(dia){

const nome = document.getElementById(`nome-${dia}`).value

if(!nome){
alert("Digite seu nome")
return
}

const { data: atual } = await client
.from('territorio_em_uso')
.select('*')
.eq('dia_semana', dia)
.single()

if(!atual || atual.status !== "disponivel"){
alert("Este território acabou de ser reservado.")
carregarSemana()
return
}

await client
.from('territorio_em_uso')
.update({
responsavel: nome,
status: "em andamento",
data_de_retirada: new Date()
})
.eq('dia_semana', dia)

carregarSemana()

}

async function concluirTerritorio(dia, territorioId, responsavel){

// salvar histórico
await client
.from('historico')
.insert({
territorio: territorioId,
responsavel: responsavel,
dia_semana: dia,
data_conclusao: new Date()
})

// territórios em uso
const { data: emUso } = await client
.from('territorio_em_uso')
.select('territorio_id')

const usadosSemana = emUso.map(t => t.territorio_id)

// todos territórios ordenados
const { data: territorios } = await client
.from('territorios')
.select('*')
.order('numero', { ascending: true })

// descobrir posição atual
let indexAtual = territorios.findIndex(t => t.id === territorioId)

let proximo = null

// procurar depois do atual
for(let i = indexAtual + 1; i < territorios.length; i++){

if(!usadosSemana.includes(territorios[i].id)){
proximo = territorios[i]
break
}

}

// se não encontrou depois, procura do começo
if(!proximo){

for(let i = 0; i < territorios.length; i++){

if(!usadosSemana.includes(territorios[i].id)){
proximo = territorios[i]
break
}

}

}

// se ainda não encontrou (todos ocupados)
if(!proximo){
alert("Todos os territórios já estão em uso.")
return
}

await client
.from('territorio_em_uso')
.update({
territorio_id: proximo.id,
responsavel: null,
status: "disponivel"
})
.eq('dia_semana', dia)

carregarSemana()

}

carregarSemana()

</script>

</body>
</html>

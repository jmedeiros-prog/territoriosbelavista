<script>

const supabaseUrl = 'https://mtokqolvifjuzxcxuxph.supabase.co'
const supabaseKey = 'sb_publishable_rppr0kLef4HDaYC8gHDrbg_LXggzCFL'

const client = supabase.createClient(supabaseUrl, supabaseKey)

let territorioAtual = null
let diaAtual = null

async function verDia(dia){

diaAtual = dia

const { data, error } = await client
.from('territorio_em_uso')
.select('*')
.eq('dia_semana', dia)
.single()

if(error || !data){
document.getElementById("resultado").innerHTML = "Erro ao carregar território"
return
}

territorioAtual = data

const { data: territorio } = await client
.from('territorios')
.select('*')
.eq('id', data.territorio_id)
.single()

if(!territorio){
document.getElementById("resultado").innerHTML = "Território não encontrado"
return
}

document.getElementById("resultado").innerHTML = `

<div class="card">

<h2>${dia}</h2>

<p><b>Território:</b> ${territorio.numero}</p>

<p><b>Responsável:</b> ${data.responsavel || "Ninguém"}</p>

<p><b>Status:</b> ${data.status}</p>

<a href="${territorio.link_mapa}" target="_blank">
<button>Ver mapa</button>
</a>

${data.status === "disponivel" ? `

<input id="nome" placeholder="Digite seu nome">

<button onclick="pegarTerritorio()">Pegar território</button>

` : `

<button onclick="concluirTerritorio()">Concluir território</button>

`}

</div>

`

}

async function pegarTerritorio(){

const nome = document.getElementById("nome").value

if(!nome){
alert("Digite seu nome")
return
}

const { data: atual } = await client
.from('territorio_em_uso')
.select('*')
.eq('dia_semana', diaAtual)
.single()

if(!atual || atual.status !== "disponivel"){
alert("Este território acabou de ser reservado por outro irmão.")
verDia(diaAtual)
return
}

await client
.from('territorio_em_uso')
.update({
responsavel: nome,
status: "em andamento",
data_de_retirada: new Date()
})
.eq('dia_semana', diaAtual)

alert("Território reservado!")

verDia(diaAtual)

}

async function concluirTerritorio(){

const atual = territorioAtual.territorio_id

const { data: territorio } = await client
.from('territorios')
.select('*')
.eq('id', atual)
.single()

await client
.from('historico')
.insert({
territorio: territorio.numero,
responsavel: territorioAtual.responsavel,
dia_semana: diaAtual,
data_conclusao: new Date()
})

const { data: historico } = await client
.from('historico')
.select('territorio')
.eq('dia_semana', diaAtual)

const usadosNoDia = historico ? historico.map(h => h.territorio) : []

const { data: territorios } = await client
.from('territorios')
.select('*')

const { data: emUso } = await client
.from('territorio_em_uso')
.select('territorio_id')

const usadosSemana = emUso
.map(t => t.territorio_id)
.filter(id => id !== atual)

let candidatos = territorios.filter(t =>
!usadosNoDia.includes(t.numero) &&
!usadosSemana.includes(t.id)
)

if(candidatos.length === 0){
candidatos = territorios.filter(t =>
!usadosSemana.includes(t.id)
)
}

let menorUso = Infinity
let escolhido = null

for(let t of candidatos){

const { count } = await client
.from('historico')
.select('*',{count:'exact',head:true})
.eq('territorio', t.numero)

if(count < menorUso){
menorUso = count
escolhido = t
}

}

if(!escolhido){
alert("Nenhum território disponível")
return
}

await client
.from('territorio_em_uso')
.update({
territorio_id: escolhido.id,
responsavel: null,
status: "disponivel",
data_conclusao: new Date()
})
.eq('dia_semana', diaAtual)

alert("Território concluído!")

verDia(diaAtual)

}

const dias = [
"domingo",
"segunda-feira",
"terça-feira",
"quarta-feira",
"quinta-feira",
"sexta-feira",
"sábado"
]

const hoje = new Date().getDay()

verDia(dias[hoje])

</script>

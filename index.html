<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Territórios</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family: Arial, sans-serif;
background:#f3f4f6;
margin:0;
padding:30px;
}

.container{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
width:260px;
}

h2{
margin-top:0;
text-transform:capitalize;
}

p{
margin:6px 0;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

.botao-mapa{
background:#10b981;
}

.botao-mapa:hover{
background:#059669;
}

input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-top:10px;
}

</style>

</head>

<body>

<div id="resultado" class="container"></div>

<script>

const supabaseUrl = 'https://mtokqolvifjuzxcxuxph.supabase.co'
const supabaseKey = 'sb_publishable_rppr0kLef4HDaYC8gHDrbg_LXggzCFL'

const client = supabase.createClient(supabaseUrl, supabaseKey)

const TOTAL_TERRITORIOS = 9

const dias = [
"domingo",
"segunda-feira",
"terça-feira",
"quarta-feira",
"quinta-feira",
"sexta-feira",
"sábado"
]

async function carregarSemana(){

document.getElementById("resultado").innerHTML = ""

for(let dia of dias){

const { data } = await client
.from('territorio_em_uso')
.select('*')
.eq('dia_semana', dia)
.single()

if(!data) continue

let territorio = null

if(data.territorio_id){

const { data: terr } = await client
.from('territorios')
.select('*')
.eq('id', data.territorio_id)
.single()

territorio = terr

}

document.getElementById("resultado").innerHTML += `

<div class="card">

<h2>${dia}</h2>

<p><b>Território:</b> ${territorio ? territorio.numero : "Sem território disponível"}</p>

<p><b>Responsável:</b> ${data.responsavel || "Ninguém"}</p>

<p><b>Status:</b> ${data.status}</p>

${territorio ? `
<a href="${territorio.link_mapa}" target="_blank">
<button class="botao-mapa">Ver mapa</button>
</a>
` : ""}

${data.status === "disponivel" && territorio ? `

<input id="nome-${dia}" placeholder="Digite seu nome">

<button onclick="pegarTerritorio('${dia}')">
Pegar território
</button>

` : data.status === "em andamento" ? `

<button onclick="concluirTerritorio('${dia}', ${data.territorio_id}, '${data.responsavel}')">
Concluir território
</button>

` : ""}

</div>

`

}

}

async function pegarTerritorio(dia){

const nome = document.getElementById(`nome-${dia}`).value

if(!nome){
alert("Digite seu nome")
return
}

await client
.from('territorio_em_uso')
.update({
responsavel: nome,
status: "em andamento",
data_de_retirada: new Date()
})
.eq('dia_semana', dia)

carregarSemana()

}

async function concluirTerritorio(dia, territorioId, responsavel){

await client
.from('historico')
.insert({
territorio: territorioId,
responsavel: responsavel,
dia_semana: dia,
data_conclusao: new Date()
})

/* territórios já em uso */

const { data: emUso } = await client
.from('territorio_em_uso')
.select('territorio_id')

const usadosSemana = emUso.map(t => t.territorio_id)

/* pegar contador */

const { data: controle } = await client
.from('controle_rotacao')
.select('proximo_territorio')
.eq('id',1)
.single()

let proximo = controle.proximo_territorio

/* pular territórios já usados */

while(usadosSemana.includes(proximo)){

proximo++

if(proximo > TOTAL_TERRITORIOS){
proximo = 1
}

}

/* atualizar contador */

let novoProximo = proximo + 1

if(novoProximo > TOTAL_TERRITORIOS){
novoProximo = 1
}

await client
.from('controle_rotacao')
.update({ proximo_territorio: novoProximo })
.eq('id',1)

/* atualizar território do dia */

await client
.from('territorio_em_uso')
.update({
territorio_id: proximo,
responsavel: null,
status: "disponivel"
})
.eq('dia_semana', dia)

carregarSemana()

}

carregarSemana()

</script>

</body>
</html>
